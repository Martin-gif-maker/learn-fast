<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Learn Fast</title>
    <link rel="stylesheet" href="sigma.css">
    <style>
        .lang-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .lang-btn:hover { background: #3b82f6; }
    </style>
</head>
<body>

    <button id="langBtn" class="lang-btn" onclick="toggleLanguage()">🇧🇬 BG</button>

    <h1 id="mainTitle">Learn Fast</h1>

    <div class="container">
        <div class="cyber-box">
            <p id="box1Text">Ready to start studying?</p>
            <a href="Main-Page.html">
                <button id="box1Btn">Get Started</button>
            </a>
        </div>

        <div class="cyber-box">
            <p id="box2Text">Want to know more about us?</p>
            <a href="Info_page.html">
                <button id="box2Btn">About Us</button>
            </a>
        </div>

        <div class="cyber-box">
            <p id="box3Text">Why should you use Learn Fast?</p>
            <a href="Chose_us_page.html">
                <button id="box3Btn">Why Us</button>
            </a>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: "Learn Fast",
                b1Text: "Ready to start studying?",
                b1Btn: "Get Started",
                b2Text: "Want to know more about us?",
                b2Btn: "About Us",
                b3Text: "Why should you use Learn Fast?",
                b3Btn: "Why Us"
            },
            bg: {
                title: "Учи Бързо",
                b1Text: "Готов ли си да започнеш?",
                b1Btn: "Започни",
                b2Text: "Искаш ли да научиш повече за нас?",
                b2Btn: "За нас",
                b3Text: "Защо да използваш Learn Fast?",
                b3Btn: "Защо ние"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'en';
        applyLanguage();

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'bg' : 'en';
            localStorage.setItem('appLang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('langBtn').innerText = currentLang === 'en' ? '🇧🇬 BG' : '🇬🇧 EN';
            document.getElementById('mainTitle').innerText = t.title;
            document.getElementById('box1Text').innerText = t.b1Text;
            document.getElementById('box1Btn').innerText = t.b1Btn;
            document.getElementById('box2Text').innerText = t.b2Text;
            document.getElementById('box2Btn').innerText = t.b2Btn;
            document.getElementById('box3Text').innerText = t.b3Text;
            document.getElementById('box3Btn').innerText = t.b3Btn;
        }
    </script>
</body>
</html>
