<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Knowledge Reactor - Generate Test</title>
    <link rel="stylesheet" href="sigma.css">
    <style>
        .nav-btn {
            position: fixed;
            top: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            font-size: 1.1rem;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }
        .nav-btn:hover { background: #3b82f6; }
        .btn-left { left: 20px; right: auto; }
        .btn-right { right: 20px; left: auto; }
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body id="portal-body">

    <a href="Main-Page.html" class="nav-btn btn-left">⬅ Back</a>
    <button id="langBtn" class="nav-btn btn-right" onclick="toggleLanguage()">🇧🇬 BG</button>

    <div class="main-wrapper">
        <h1 class="glow-title" id="pageTitle">Knowledge Reactor</h1>
        <p class="subtitle-text" id="pageSubtitle">Turn your notes into a smart test.</p>

        <div class="orbit-grid-clean">
            <div class="input-card">
                <div class="label-row">
                    <label id="inputLabel" style="margin:0;">PASTE YOUR TEXT</label>
                    <span id="charCount" style="font-size: 0.8rem; color: #94a3b8;">0 / 5000</span>
                </div>
                <div class="text-area-container">
                    <textarea id="quizInput" maxlength="5000" placeholder="Paste your lesson, notes, or chapter here..." oninput="updateCount(this)"></textarea>
                </div>
                <button id="quizBtn" class="generate-btn">👉 GENERATE TEST</button>
            </div>
        </div>

        <div id="quizContainer" style="max-width: 800px; margin: 40px auto; display: none;"></div>
    </div>

    <script>
        function updateCount(textarea) {
            const count = textarea.value.length;
            const counter = document.getElementById('charCount');
            counter.innerText = `${count} / 5000`;
            counter.style.color = count >= 4900 ? "#ef4444" : "#94a3b8";
        }

        const translations = {
            en: {
                title: "Knowledge Reactor",
                subtitle: "Turn your notes into a smart test.",
                label: "PASTE YOUR TEXT",
                placeholder: "Paste your lesson, notes, or chapter here...",
                btn: "👉 GENERATE TEST",
                loading: "🚀 Generating Quiz...",
                correct: "✅ Correct!",
                wrong: "❌ Wrong!",
                alertText: "Please paste text first!",
                back: "⬅ Back"
            },
            bg: {
                title: "Реактор на Знанието",
                subtitle: "Превърни записките си в умен тест.",
                label: "ПОСТАВИ ТЕКСТ ТУК",
                placeholder: "Постави урока или записките си тук...",
                btn: "👉 ГЕНЕРИРАЙ ТЕСТ",
                loading: "🚀 Генериране...",
                correct: "✅ Правилно!",
                wrong: "❌ Грешка!",
                alertText: "Моля постави текст!",
                back: "⬅ Назад"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'en';
        applyLanguage();

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'bg' : 'en';
            localStorage.setItem('appLang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('pageTitle').innerText = t.title;
            document.getElementById('pageSubtitle').innerText = t.subtitle;
            document.getElementById('inputLabel').innerText = t.label;
            document.getElementById('quizInput').placeholder = t.placeholder;
            document.getElementById('quizBtn').innerText = t.btn;
            document.getElementById('langBtn').innerText = currentLang === 'en' ? '🇧🇬 BG' : '🇬🇧 EN';
            document.querySelector('.btn-left').innerText = t.back;
        }

        const btn = document.getElementById('quizBtn');
        const input = document.getElementById('quizInput');
        const container = document.getElementById('quizContainer');

        btn.addEventListener('click', async () => {
            const text = input.value;
            const t = translations[currentLang];
            if (!text) return alert(t.alertText);
            btn.innerText = t.loading;
            try {
                const res = await fetch('/api/quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, lang: currentLang })
                });
                const data = await res.json();
                if (data.error) alert(data.error);
                else renderQuiz(data.quiz);
            } catch (e) { alert("Server Error (Is Python Running?)"); }
            btn.innerText = t.btn;
        });

        function renderQuiz(questions) {
            container.innerHTML = "";
            container.style.display = "block";
            const t = translations[currentLang];

            questions.forEach((q, idx) => {
                let opts = "";
                const correctEnc = btoa(unescape(encodeURIComponent(q.correct_answer.trim())));
                q.options.forEach(opt => {
                    const optEnc = btoa(unescape(encodeURIComponent(opt.trim())));
                    opts += `<div class="quiz-option" data-val="${optEnc}"
                             style="margin:10px 0; padding:15px; border:1px solid #3b82f6; border-radius:10px; cursor:pointer;"
                             onclick="checkAns(this, '${correctEnc}')">${opt}</div>`;
                });

                container.innerHTML += `
                    <div style="background:rgba(15,23,42,0.8); padding:30px; margin-bottom:30px; border:2px solid #3b82f6; border-radius:20px;">
                        <h3 style="color:white;">${idx+1}. ${q.question}</h3>
                        <div class="opt-group">${opts}</div>
                        <p class="expl" style="display:none; color:#4ade80; margin-top:5px;">${q.explanation}</p>
                    </div>`;
            });
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.checkAns = function(el, corrEnc) {
            const parent = el.parentElement;
            if (parent.classList.contains('locked')) return;
            parent.classList.add('locked');

            const t = translations[currentLang];
            const selText = decodeURIComponent(escape(window.atob(el.getAttribute('data-val')))).trim().toLowerCase().replace(/^[a-d][\)\.]\s*/, "");
            const corrText = decodeURIComponent(escape(window.atob(corrEnc))).trim().toLowerCase().replace(/^[a-d][\)\.]\s*/, "");

            const card = parent.parentElement;
            const expl = card.querySelector('.expl');

            if (selText === corrText) {
                el.style.background = "#22c55e";
                el.style.color = "black";
                expl.innerText = t.correct + " " + expl.innerText;
            } else {
                el.style.background = "#ef4444";
                expl.innerText = t.wrong + " " + expl.innerText;
                parent.querySelectorAll('.quiz-option').forEach(opt => {
                    const val = decodeURIComponent(escape(window.atob(opt.getAttribute('data-val')))).trim().toLowerCase().replace(/^[a-d][\)\.]\s*/, "");
                    if (val === corrText) opt.style.border = "2px solid #22c55e";
                });
            }
            expl.style.display = "block";
        };
    </script>
</body>
</html>
