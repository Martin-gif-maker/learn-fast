<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Smart Study - Text Simplifier</title>
    <link rel="stylesheet" href="sigma.css">

    <!-- 🚀 AUTO-CORRECTOR: Forces the page to run on the Python Server (Port 5001) -->
    <script>
        if ((window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") && window.location.port !== "5001") {
            console.log("Wrong Port! Redirecting to Python Server...");
            window.location.href = "http://127.0.0.1:5001" + window.location.pathname;
        }
    </script>

    <style>
        .nav-btn {
            position: fixed;
            top: 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 200;
            font-size: 1.1rem;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
        }
        .nav-btn:hover { background: #3b82f6; }

        .btn-left { left: 20px; right: auto; }
        .btn-right { right: 20px; left: auto; }

        .center-stats {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .badge {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.5);
            backdrop-filter: blur(5px);
            color: white;
            white-space: nowrap;
        }
        .streak-pill { border-color: #ef4444; color: #ef4444; }

        /* LABEL FIX */
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body id="portal-body">

    <a href="Main-Page.html" class="nav-btn btn-left">⬅ Back</a>

    <div class="center-stats">
        <div id="userStats" class="badge">Level 1 • 0 XP</div>
        <div class="badge streak-pill">🔥 Streak</div>
    </div>

    <button id="langBtn" class="nav-btn btn-right" onclick="toggleLanguage()">🇧🇬 BG</button>

    <div class="main-wrapper">
        <h1 class="glow-title" id="pageTitle">Smart Study</h1>
        <p class="subtitle-text" id="pageSubtitle">Explain Like I'm 5 (Funny & Simple)</p>

        <div class="orbit-grid-clean">
            <div class="input-card">

                <!-- NEW LABEL ROW -->
                <div class="label-row">
                    <label id="inputLabel" style="margin:0;">PASTE COMPLEX TEXT</label>
                    <span id="charCount" style="font-size: 0.8rem; color: #94a3b8;">0 / 5000</span>
                </div>

                <div class="text-area-container">
                    <textarea id="simInput" maxlength="5000" placeholder="Paste a difficult paragraph, long article, or confusing notes here..." oninput="updateCount(this)"></textarea>
                </div>
                <button id="simBtn" class="generate-btn">👉 SIMPLIFY TEXT</button>
            </div>
        </div>

        <div id="simContainer" style="max-width: 800px; margin: 40px auto; display: none; background: rgba(15, 23, 42, 0.9); padding: 40px; border-radius: 20px; border: 2px solid #3b82f6;">
            <h2 id="simTitle" style="color: #4ade80; text-transform: uppercase;"></h2>
            <p id="simContent" style="color: white; font-size: 1.2rem; line-height: 1.8; margin-bottom: 30px;"></p>
            <h3 id="keyPointsTitle" style="color: #3b82f6; margin-bottom: 15px;">🚀 Key Takeaways:</h3>
            <ul id="simPoints" style="color: #cbd5e1; text-align: left; font-size: 1.1rem; line-height: 1.6;"></ul>
        </div>
    </div>

    <script>
        function updateCount(textarea) {
            const count = textarea.value.length;
            const counter = document.getElementById('charCount');
            counter.innerText = `${count} / 5000`;
            counter.style.color = count >= 4900 ? "#ef4444" : "#94a3b8";
        }

        const translations = {
            en: {
                title: "Smart Study",
                subtitle: "Explain Like I'm 5 (Funny & Simple)",
                label: "PASTE COMPLEX TEXT",
                placeholder: "Paste a difficult paragraph...",
                btn: "👉 SIMPLIFY TEXT",
                loading: "🚀 Making it funny...",
                pointsTitle: "🚀 Key Takeaways:",
                alertText: "Please paste text first!",
                back: "⬅ Back"
            },
            bg: {
                title: "Умно Учене",
                subtitle: "Обясни като на 5-годишен (Забавно)",
                label: "ПОСТАВИ СЛОЖЕН ТЕКСТ",
                placeholder: "Постави труден параграф или текст...",
                btn: "👉 ОПРОСТИ ТЕКСТА",
                loading: "🚀 Опростяване...",
                pointsTitle: "🚀 Основни Точки:",
                alertText: "Моля постави текст!",
                back: "⬅ Назад"
            }
        };

        let currentLang = localStorage.getItem('appLang') || 'en';
        applyLanguage();

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'bg' : 'en';
            localStorage.setItem('appLang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('pageTitle').innerText = t.title;
            document.getElementById('pageSubtitle').innerText = t.subtitle;
            document.getElementById('inputLabel').innerText = t.label;
            document.getElementById('simInput').placeholder = t.placeholder;
            document.getElementById('simBtn').innerText = t.btn;
            document.getElementById('keyPointsTitle').innerText = t.pointsTitle;
            document.getElementById('langBtn').innerText = currentLang === 'en' ? '🇧🇬 BG' : '🇬🇧 EN';
            document.querySelector('.btn-left').innerText = t.back;
        }

        const currentUser = JSON.parse(localStorage.getItem("currentUser"));
        const statsBadge = document.getElementById("userStats");
        if (currentUser) statsBadge.innerText = `Level ${currentUser.level} • ${currentUser.xp} XP`;

        const btn = document.getElementById('simBtn');
        const input = document.getElementById('simInput');
        const container = document.getElementById('simContainer');

        btn.addEventListener('click', async () => {
            const text = input.value;
            const t = translations[currentLang];

            if (!text) return alert(t.alertText);
            btn.innerText = t.loading;

            try {
                // FIXED: Relative path URL
                const res = await fetch('/api/simplify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, lang: currentLang })
                });

                const data = await res.json();

                if (data.error) {
                    alert(data.error);
                } else {
                    container.style.display = "block";
                    document.getElementById('simTitle').innerText = data.summary_title;
                    document.getElementById('simContent').innerText = data.simplified_content;

                    const list = document.getElementById('simPoints');
                    list.innerHTML = "";
                    data.key_points.forEach(point => {
                        list.innerHTML += `<li style="margin-bottom: 10px;">✨ ${point}</li>`;
                    });
                    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }

            } catch (e) { alert("Server Error (Is Python running?)"); }
            btn.innerText = t.btn;
        });
    </script>
</body>
</html>
